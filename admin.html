<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 王庆召 & 饶怡萍</title>
  <style>
    :root {
      --primary: #E8A598;
      --primary-dark: #D48578;
      --bg: #FFF9F5;
      --text: #4A4A4A;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* 侧边栏 */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 250px;
      background: var(--white);
      border-right: 1px solid rgba(232,165,152,0.2);
      padding: 30px 20px;
      overflow-y: auto;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 30px;
      text-align: center;
    }

    .nav-item {
      padding: 12px 16px;
      margin-bottom: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-item:hover, .nav-item.active {
      background: var(--primary);
      color: white;
    }

    .nav-icon { font-size: 18px; }

    /* 主内容区 */
    .main {
      margin-left: 250px;
      padding: 40px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
    }

    .btn {
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #F56565;
    }

    .btn-danger:hover {
      background: #E53E3E;
    }

    /* 卡片 */
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(232,165,152,0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(232,165,152,0.2);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
    }

    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(232,165,152,0.3);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    /* 列表 */
    .list-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid rgba(232,165,152,0.2);
      border-radius: 8px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }

    .list-item:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(232,165,152,0.1);
    }

    .list-content {
      flex: 1;
    }

    .list-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .list-meta {
      font-size: 13px;
      color: #9A9A9A;
    }

    .list-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--white);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(232,165,152,0.1);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: #9A9A9A;
    }

    /* 页面切换 */
    .page { display: none; }
    .page.active { display: block; }

    /* 响应式 */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid rgba(232,165,152,0.2);
      }
      .main {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="logo">💕 后台管理</div>
    <nav>
      <div class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon">📊</span>
        <span>仪表盘</span>
      </div>
      <div class="nav-item" onclick="showPage('moments')">
        <span class="nav-icon">💕</span>
        <span>点点滴滴</span>
      </div>
      <div class="nav-item" onclick="showPage('leaves')">
        <span class="nav-icon">📝</span>
        <span>留言板</span>
      </div>
      <div class="nav-item" onclick="showPage('photos')">
        <span class="nav-icon">📷</span>
        <span>照片管理</span>
      </div>
      <div class="nav-item" onclick="showPage('lists')">
        <span class="nav-icon">📋</span>
        <span>心愿清单</span>
      </div>
      <div class="nav-item" onclick="showPage('settings')">
        <span class="nav-icon">⚙️</span>
        <span>设置</span>
      </div>
    </nav>
  </aside>

  <!-- 主内容区 -->
  <main class="main">
    <!-- 仪表盘 -->
    <section id="dashboard" class="page active">
      <div class="header">
        <h1 class="page-title">仪表盘</h1>
        <a href="index.html" target="_blank" class="btn">🌐 查看网站</a>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statMoments">0</div>
          <div class="stat-label">点点滴滴</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLeaves">0</div>
          <div class="stat-label">留言</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPhotos">0</div>
          <div class="stat-label">照片</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLists">0</div>
          <div class="stat-label">心愿</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">快速操作</h2>
        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="btn" onclick="showPage('moments'); openModal('momentModal')">➕ 添加记录</button>
          <button class="btn" onclick="showPage('photos'); openModal('photoModal')">📷 上传照片</button>
          <button class="btn" onclick="exportData()">💾 导出数据</button>
        </div>
      </div>
    </section>

    <!-- 点点滴滴管理 -->
    <section id="moments" class="page">
      <div class="header">
        <h1 class="page-title">点点滴滴</h1>
        <button class="btn" onclick="openModal('momentModal')">➕ 添加记录</button>
      </div>

      <div id="momentsList"></div>
    </section>

    <!-- 留言板管理 -->
    <section id="leaves" class="page">
      <div class="header">
        <h1 class="page-title">留言板</h1>
      </div>

      <div id="leavesList"></div>
    </section>

    <!-- 照片管理 -->
    <section id="photos" class="page">
      <div class="header">
        <h1 class="page-title">照片管理</h1>
        <button class="btn" onclick="openModal('photoModal')">📷 上传照片</button>
      </div>

      <div id="photosList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;"></div>
    </section>

    <!-- 心愿清单管理 -->
    <section id="lists" class="page">
      <div class="header">
        <h1 class="page-title">心愿清单</h1>
        <button class="btn" onclick="openModal('listModal')">➕ 添加心愿</button>
      </div>

      <div id="listsList"></div>
    </section>

    <!-- 设置 -->
    <section id="settings" class="page">
      <div class="header">
        <h1 class="page-title">设置</h1>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">基本信息</h2>
        </div>
        <div class="form-group">
          <label class="form-label">名字 1</label>
          <input type="text" class="form-input" id="settingName1" value="王庆召">
        </div>
        <div class="form-group">
          <label class="form-label">名字 2</label>
          <input type="text" class="form-input" id="settingName2" value="饶怡萍">
        </div>
        <div class="form-group">
          <label class="form-label">在一起日期</label>
          <input type="date" class="form-input" id="settingLoveDate" value="2023-05-13">
        </div>
        <button class="btn" onclick="saveSettings()">💾 保存设置</button>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">数据管理</h2>
        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
          <button class="btn" onclick="exportData()">📤 导出数据</button>
          <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空所有数据</button>
        </div>
      </div>
    </section>
  </main>

  <!-- 弹窗：添加记录 -->
  <div id="momentModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:16px;padding:30px;max-width:500px;width:90%;">
      <h2 style="margin-bottom:20px;">添加记录</h2>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" class="form-input" id="momentDate">
      </div>
      <div class="form-group">
        <label class="form-label">标题</label>
        <input type="text" class="form-input" id="momentTitle" placeholder="如：第一次约会">
      </div>
      <div class="form-group">
        <label class="form-label">内容</label>
        <textarea class="form-textarea" id="momentContent" placeholder="记录这一刻..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">类型</label>
        <select class="form-select" id="momentType">
          <option value="love">💕 恋爱</option>
          <option value="food">🍽️ 美食</option>
          <option value="travel">✈️ 旅行</option>
          <option value="daily">📅 日常</option>
        </select>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button class="btn" onclick="closeModal('momentModal')" style="background:#9A9A9A;">取消</button>
        <button class="btn" onclick="addMoment()">保存</button>
      </div>
    </div>
  </div>

  <!-- 弹窗：添加照片 -->
  <div id="photoModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:16px;padding:30px;max-width:500px;width:90%;">
      <h2 style="margin-bottom:20px;">上传照片</h2>
      <div class="form-group">
        <label class="form-label">图片链接</label>
        <input type="text" class="form-input" id="photoUrl" placeholder="https://... 或 images/xxx.jpg">
      </div>
      <div class="form-group">
        <label class="form-label">说明文字</label>
        <input type="text" class="form-input" id="photoCaption" placeholder="这张照片的故事...">
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button class="btn" onclick="closeModal('photoModal')" style="background:#9A9A9A;">取消</button>
        <button class="btn" onclick="addPhoto()">保存</button>
      </div>
    </div>
  </div>

  <!-- 弹窗：添加心愿 -->
  <div id="listModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:16px;padding:30px;max-width:500px;width:90%;">
      <h2 style="margin-bottom:20px;">添加心愿</h2>
      <div class="form-group">
        <label class="form-label">心愿内容</label>
        <input type="text" class="form-input" id="listTitle" placeholder="想一起做的事...">
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button class="btn" onclick="closeModal('listModal')" style="background:#9A9A9A;">取消</button>
        <button class="btn" onclick="addList()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ========== 数据管理 ==========
    const DB = {
      moments: JSON.parse(localStorage.getItem('admin_moments') || '[]'),
      leaves: JSON.parse(localStorage.getItem('admin_leaves') || '[]'),
      photos: JSON.parse(localStorage.getItem('admin_photos') || '[]'),
      lists: JSON.parse(localStorage.getItem('admin_lists') || '[]'),
      settings: JSON.parse(localStorage.getItem('admin_settings') || '{"name1":"王庆召","name2":"饶怡萍","loveDate":"2023-05-13"}')
    };

    // 保存数据
    function saveData() {
      localStorage.setItem('admin_moments', JSON.stringify(DB.moments));
      localStorage.setItem('admin_leaves', JSON.stringify(DB.leaves));
      localStorage.setItem('admin_photos', JSON.stringify(DB.photos));
      localStorage.setItem('admin_lists', JSON.stringify(DB.lists));
      localStorage.setItem('admin_settings', JSON.stringify(DB.settings));
    }

    // ========== 页面切换 ==========
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      event.currentTarget.classList.add('active');
      
      // 刷新数据
      if (pageId === 'dashboard') updateStats();
      if (pageId === 'moments') renderMoments();
      if (pageId === 'leaves') renderLeaves();
      if (pageId === 'photos') renderPhotos();
      if (pageId === 'lists') renderLists();
      if (pageId === 'settings') loadSettings();
    }

    // ========== 仪表盘 ==========
    function updateStats() {
      document.getElementById('statMoments').textContent = DB.moments.length;
      document.getElementById('statLeaves').textContent = DB.leaves.length;
      document.getElementById('statPhotos').textContent = DB.photos.length;
      document.getElementById('statLists').textContent = DB.lists.length;
    }

    // ========== 点点滴滴 ==========
    function renderMoments() {
      const container = document.getElementById('momentsList');
      if (DB.moments.length === 0) {
        container.innerHTML = '<div class="card" style="text-align:center;color:#9A9A9A;padding:40px;">还没有记录，快来添加第一条吧</div>';
        return;
      }
      container.innerHTML = DB.moments.map((m, i) => `
        <div class="list-item">
          <div class="list-content">
            <div class="list-title">${m.title}</div>
            <div class="list-meta">📅 ${m.date} · ${getTypeName(m.type)}</div>
            <div style="margin-top:8px;color:#5A5A5A;">${m.content}</div>
          </div>
          <div class="list-actions">
            <button class="btn btn-sm" onclick="editMoment(${i})">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteMoment(${i})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function addMoment() {
      const date = document.getElementById('momentDate').value;
      const title = document.getElementById('momentTitle').value;
      const content = document.getElementById('momentContent').value;
      const type = document.getElementById('momentType').value;

      if (!date || !title) {
        alert('请填写日期和标题');
        return;
      }

      DB.moments.unshift({ date, title, content, type, createdAt: new Date().toISOString() });
      saveData();
      renderMoments();
      updateStats();
      closeModal('momentModal');
      
      // 清空表单
      document.getElementById('momentDate').value = '';
      document.getElementById('momentTitle').value = '';
      document.getElementById('momentContent').value = '';
      
      alert('✅ 添加成功！');
    }

    function deleteMoment(index) {
      if (confirm('确定要删除这条记录吗？')) {
        DB.moments.splice(index, 1);
        saveData();
        renderMoments();
        updateStats();
      }
    }

    function getTypeName(type) {
      const names = { love: '💕 恋爱', food: '🍽️ 美食', travel: '✈️ 旅行', daily: '📅 日常' };
      return names[type] || type;
    }

    // ========== 留言板 ==========
    function renderLeaves() {
      const container = document.getElementById('leavesList');
      if (DB.leaves.length === 0) {
        container.innerHTML = '<div class="card" style="text-align:center;color:#9A9A9A;padding:40px;">还没有留言</div>';
        return;
      }
      container.innerHTML = DB.leaves.map((l, i) => `
        <div class="list-item">
          <div class="list-content">
            <div class="list-title">${l.name}</div>
            <div class="list-meta">📅 ${l.date}</div>
            <div style="margin-top:8px;color:#5A5A5A;">${l.content}</div>
          </div>
          <div class="list-actions">
            <button class="btn btn-sm btn-danger" onclick="deleteLeave(${i})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function deleteLeave(index) {
      if (confirm('确定要删除这条留言吗？')) {
        DB.leaves.splice(index, 1);
        saveData();
        renderLeaves();
        updateStats();
      }
    }

    // ========== 照片管理 ==========
    function renderPhotos() {
      const container = document.getElementById('photosList');
      if (DB.photos.length === 0) {
        container.innerHTML = '<div class="card" style="text-align:center;color:#9A9A9A;padding:40px;grid-column:1/-1;">还没有照片，快来上传第一张吧</div>';
        return;
      }
      container.innerHTML = DB.photos.map((p, i) => `
        <div style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(232,165,152,0.1);">
          <img src="${p.img}" style="width:100%;aspect-ratio:1;object-fit:cover;">
          ${p.caption ? `<div style="padding:12px;font-size:13px;color:#5A5A5A;">${p.caption}</div>` : ''}
          <div style="padding:12px;display:flex;gap:8px;">
            <button class="btn btn-sm" onclick="editPhoto(${i})" style="flex:1;">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deletePhoto(${i})" style="flex:1;">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function addPhoto() {
      const img = document.getElementById('photoUrl').value;
      const caption = document.getElementById('photoCaption').value;

      if (!img) {
        alert('请填写图片链接');
        return;
      }

      DB.photos.unshift({ img, caption, createdAt: new Date().toISOString() });
      saveData();
      renderPhotos();
      updateStats();
      closeModal('photoModal');
      
      document.getElementById('photoUrl').value = '';
      document.getElementById('photoCaption').value = '';
      
      alert('✅ 上传成功！');
    }

    function deletePhoto(index) {
      if (confirm('确定要删除这张照片吗？')) {
        DB.photos.splice(index, 1);
        saveData();
        renderPhotos();
        updateStats();
      }
    }

    // ========== 心愿清单 ==========
    function renderLists() {
      const container = document.getElementById('listsList');
      if (DB.lists.length === 0) {
        container.innerHTML = '<div class="card" style="text-align:center;color:#9A9A9A;padding:40px;">还没有心愿，快来添加第一个吧</div>';
        return;
      }
      container.innerHTML = DB.lists.map((l, i) => `
        <div class="list-item">
          <div class="list-content">
            <div class="list-title" style="${l.done?'text-decoration:line-through;color:#9A9A9A':''}">${l.title}</div>
            <div class="list-meta">${l.done ? '✅ 已完成' : '⏳ 未完成'}</div>
          </div>
          <div class="list-actions">
            <button class="btn btn-sm" onclick="toggleList(${i})">${l.done ? '↩️' : '✅'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteList(${i})">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function addList() {
      const title = document.getElementById('listTitle').value;

      if (!title) {
        alert('请填写心愿内容');
        return;
      }

      DB.lists.unshift({ title, done: false, createdAt: new Date().toISOString() });
      saveData();
      renderLists();
      updateStats();
      closeModal('listModal');
      
      document.getElementById('listTitle').value = '';
      
      alert('✅ 添加成功！');
    }

    function toggleList(index) {
      DB.lists[index].done = !DB.lists[index].done;
      saveData();
      renderLists();
    }

    function deleteList(index) {
      if (confirm('确定要删除这个心愿吗？')) {
        DB.lists.splice(index, 1);
        saveData();
        renderLists();
        updateStats();
      }
    }

    // ========== 设置 ==========
    function loadSettings() {
      document.getElementById('settingName1').value = DB.settings.name1;
      document.getElementById('settingName2').value = DB.settings.name2;
      document.getElementById('settingLoveDate').value = DB.settings.loveDate;
    }

    function saveSettings() {
      DB.settings.name1 = document.getElementById('settingName1').value;
      DB.settings.name2 = document.getElementById('settingName2').value;
      DB.settings.loveDate = document.getElementById('settingLoveDate').value;
      saveData();
      alert('✅ 设置已保存！');
    }

    // ========== 数据导出 ==========
    function exportData() {
      const data = {
        moments: DB.moments,
        leaves: DB.leaves,
        photos: DB.photos,
        lists: DB.lists,
        settings: DB.settings,
        exportedAt: new Date().toISOString()
      };
      
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `love-diary-backup-${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAllData() {
      if (confirm('⚠️ 确定要清空所有数据吗？此操作不可恢复！')) {
        if (confirm('再次确认：清空所有数据？')) {
          localStorage.clear();
          location.reload();
        }
      }
    }

    // ========== 弹窗控制 ==========
    function openModal(modalId) {
      document.getElementById(modalId).style.display = 'flex';
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
      updateStats();
    });

    // 点击弹窗外部关闭
    window.onclick = function(event) {
      if (event.target.classList.contains('modal')) {
        closeModal(event.target.id);
      }
    }
  </script>
</body>
</html>
