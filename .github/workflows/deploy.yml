name: 🚀 自动部署

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 验证 HTML
        run: |
          echo "验证 index.html..."
          test -f index.html && echo "✅ 文件存在" || exit 1

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
