<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="古风资讯 - 个性化新闻聚合平台，每日实时更新">
  <meta name="theme-color" content="#E0E5EC">
  <title>📰 每日要闻 - 拟物化资讯</title>
  
  <!-- 性能优化：预加载关键资源 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap');

    /* ========================================
       设计系统 - UI/UX Pro Max 标准
       拟物化 (Neumorphism) 风格
       ======================================== */
    :root {
      /* 拟物化配色系统 */
      --bg: #E0E5EC;
      --bg-dark: #D1D9E6;
      --text-primary: #4A5568;
      --text-secondary: #718096;
      --text-light: #A0AEC0;
      
      /* 强调色 */
      --primary: #667EEA;
      --primary-dark: #5A67D8;
      --accent: #F093FB;
      --accent-secondary: #F5576C;
      
      /* 阴影系统 - 拟物化核心 */
      --shadow-light: -8px -8px 16px rgba(255, 255, 255, 0.8);
      --shadow-dark: 8px 8px 16px rgba(163, 177, 198, 0.6);
      --shadow-inner: inset 6px 6px 12px rgba(163, 177, 198, 0.5),
                      inset -6px -6px 12px rgba(255, 255, 255, 0.9);
      --shadow-float: 12px 12px 24px rgba(163, 177, 198, 0.5),
                      -12px -12px 24px rgba(255, 255, 255, 0.9);
      --shadow-pressed: inset 4px 4px 8px rgba(163, 177, 198, 0.5),
                        inset -4px -4px 8px rgba(255, 255, 255, 0.9);
      
      /* 语义化颜色 */
      --success: #48BB78;
      --warning: #ED8936;
      --error: #F56565;
      
      /* 间距系统 - 4px 基准 */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      
      /* 排版系统 */
      --font-sans: 'Poppins', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-serif: 'Noto Serif SC', serif;
      
      /* 圆角系统 - 大圆角拟物化 */
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-full: 9999px;
      
      /* 动效系统 */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ========================================
       基础样式 - 无障碍优化
       ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 焦点可见性 - 无障碍 */
    :focus-visible {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    /* 跳过导航链接 - 无障碍 */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: var(--space-3) var(--space-5);
      z-index: 9999;
      transition: top var(--transition-fast);
      border-radius: var(--radius-full);
      font-weight: 600;
    }

    .skip-link:focus {
      top: var(--space-2);
    }

    /* ========================================
       Header - 拟物化悬浮效果
       ======================================== */
    header {
      background: var(--bg);
      padding: var(--space-6) var(--space-5);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-dark);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-4);
    }

    .logo {
      font-family: var(--font-sans);
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
      background: var(--bg);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-light), var(--shadow-dark);
      transition: all var(--transition-base);
    }

    .logo:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-float);
    }

    .logo:active {
      transform: translateY(0);
      box-shadow: var(--shadow-pressed);
    }

    .logo::before {
      content: '📰';
      font-size: 32px;
    }

    /* ========================================
       控件 - 拟物化按钮
       ======================================== */
    .controls {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .controls select,
    .controls button {
      padding: var(--space-3) var(--space-5);
      border: none;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg);
      color: var(--text-primary);
      transition: all var(--transition-base);
      min-height: 44px;
      min-width: 44px;
      box-shadow: var(--shadow-light), var(--shadow-dark);
    }

    .controls select:hover,
    .controls button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-float);
      color: var(--primary);
    }

    .controls select:active,
    .controls button:active {
      transform: translateY(0);
      box-shadow: var(--shadow-pressed);
    }

    .controls button.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    /* ========================================
       Main Content
       ======================================== */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-5);
      position: relative;
      z-index: 1;
    }

    /* 拟物化标题 */
    .scroll-title {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .scroll-title h2 {
      font-family: var(--font-sans);
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      display: inline-block;
      padding: var(--space-5) var(--space-10);
      background: var(--bg);
      border-radius: var(--radius-full);
      box-shadow: var(--shadow-light), var(--shadow-dark);
    }

    /* ========================================
       Category Tabs - 拟物化胶囊
       ======================================== */
    .category-tabs {
      display: flex;
      gap: var(--space-3);
      margin-bottom: var(--space-8);
      flex-wrap: wrap;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-inner);
    }

    .category-tab {
      padding: var(--space-3) var(--space-6);
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--transition-base);
      background: var(--bg);
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      color: var(--text-secondary);
      min-height: 44px;
      box-shadow: var(--shadow-light), var(--shadow-dark);
    }

    .category-tab:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-float);
      color: var(--primary);
    }

    .category-tab:active {
      transform: translateY(0);
      box-shadow: var(--shadow-pressed);
    }

    .category-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: var(--shadow-dark);
    }

    /* ========================================
       News Grid - 响应式布局
       ======================================== */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--space-6);
    }

    /* ========================================
       News Card - 拟物化卡片
       ======================================== */
    .news-card {
      background: var(--bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-light), var(--shadow-dark);
      transition: all var(--transition-base);
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .news-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent-secondary));
    }

    .news-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-float);
    }

    .news-card:active {
      transform: translateY(-2px);
      box-shadow: var(--shadow-pressed);
    }

    .news-card:focus-within {
      outline: 3px solid var(--primary);
      outline-offset: 2px;
    }

    .news-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--bg-dark);
      transition: all var(--transition-base);
      loading: lazy;
    }

    .news-card:hover img {
      filter: brightness(1.05);
    }

    .news-card .content {
      padding: var(--space-5);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .news-card .category {
      display: inline-block;
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: var(--radius-full);
      font-size: 12px;
      margin-bottom: var(--space-3);
      font-weight: 600;
      align-self: flex-start;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .news-card .title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: var(--space-3);
      line-height: 1.5;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex-shrink: 0;
    }

    .news-card .desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.7;
      flex: 1;
    }

    .news-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-light);
      padding-top: var(--space-4);
      border-top: 1px solid rgba(163, 177, 198, 0.3);
      flex-shrink: 0;
    }

    .news-card .source,
    .news-card .time {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-weight: 600;
    }

    /* ========================================
       Loading & Error States
       ======================================== */
    .loading {
      text-align: center;
      padding: var(--space-16) var(--space-5);
      color: var(--text-secondary);
      font-size: 16px;
    }

    .loading::before {
      content: '📰';
      display: block;
      font-size: 48px;
      margin-bottom: var(--space-5);
      animation: rotate 3s linear infinite;
      display: inline-block;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: var(--space-16) var(--space-5);
      color: var(--error);
      font-size: 16px;
    }

    .error button {
      margin-top: var(--space-4);
      padding: var(--space-3) var(--space-6);
      cursor: pointer;
      background: var(--bg);
      color: var(--text-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      min-height: 44px;
      box-shadow: var(--shadow-light), var(--shadow-dark);
      transition: all var(--transition-base);
    }

    .error button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-float);
    }

    .error button:active {
      transform: translateY(0);
      box-shadow: var(--shadow-pressed);
    }

    /* ========================================
       Footer - 拟物化
       ======================================== */
    footer {
      text-align: center;
      padding: var(--space-10) var(--space-5);
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: var(--space-16);
      background: var(--bg);
      border-top: 1px solid rgba(255,255,255,0.2);
      box-shadow: var(--shadow-light);
    }

    .seal {
      display: inline-block;
      padding: var(--space-2) var(--space-4);
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      color: white;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
    }

    /* ========================================
       响应式断点 - Mobile First
       ======================================== */
    @media (max-width: 767px) {
      :root {
        --space-8: 24px;
        --space-10: 32px;
      }

      .header-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .logo {
        font-size: 24px;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .category-tabs {
        overflow-x: auto;
        justify-content: flex-start;
        -webkit-overflow-scrolling: touch;
      }

      .scroll-title h2 {
        font-size: 24px;
        padding: var(--space-4) var(--space-6);
      }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      .news-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .news-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* ========================================
       减少运动偏好 - 无障碍
       ======================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ========================================
       打印样式
       ======================================== */
    @media print {
      header, .controls, .category-tabs, footer {
        display: none;
      }

      .news-card {
        break-inside: avoid;
        box-shadow: none;
        border: 1px solid #ccc;
      }
    }
  </style>
</head>
<body>
  <!-- 无障碍：跳过导航 -->
  <a href="#main-content" class="skip-link">跳到主要内容</a>

  <!-- 语义化 Header -->
  <header role="banner">
    <div class="header-content">
      <h1 class="logo" aria-label="每日要闻">每日要闻</h1>
      <div class="controls" role="group" aria-label="新闻控制选项">
        <label for="sourceSelect" class="visually-hidden">选择新闻源</label>
        <select id="sourceSelect" onchange="changeSource()" aria-label="选择新闻来源">
          <option value="all">📰 全部来源</option>
          <option value="sina">🔴 新浪新闻</option>
          <option value="163">🔵 网易新闻</option>
          <option value="qq">🟢 腾讯新闻</option>
          <option value="36kr">🟡 36Kr</option>
          <option value="hacker">💻 Hacker News</option>
        </select>
        <button onclick="loadNews()" class="primary" aria-label="刷新新闻">🔄 刷新</button>
      </div>
    </div>
  </header>

  <!-- 语义化 Main -->
  <main id="main-content" role="main">
    <section class="scroll-title" aria-labelledby="section-title">
      <h2 id="section-title">📰 今日头条</h2>
    </section>

    <!-- 分类导航 -->
    <nav class="category-tabs" role="tablist" aria-label="新闻分类">
      <button class="category-tab active" data-category="all" role="tab" aria-selected="true">全部</button>
      <button class="category-tab" data-category="tech" role="tab" aria-selected="false">科技</button>
      <button class="category-tab" data-category="finance" role="tab" aria-selected="false">财经</button>
      <button class="category-tab" data-category="world" role="tab" aria-selected="false">国际</button>
      <button class="category-tab" data-category="sports" role="tab" aria-selected="false">体育</button>
      <button class="category-tab" data-category="entertainment" role="tab" aria-selected="false">娱乐</button>
    </nav>

    <!-- 新闻列表 -->
    <section id="news" class="news-grid" role="feed" aria-label="新闻列表" aria-busy="true">
      <div class="loading" role="status">正在加载要闻...</div>
    </section>
  </main>

  <!-- 语义化 Footer -->
  <footer role="contentinfo">
    <p>
      <span class="seal">更新</span>
      <span id="lastUpdate" aria-live="polite">-</span>
    </p>
    <p>每 3 分钟自动刷新 · 支持离线阅读</p>
    <p style="margin-top: var(--space-4); font-size: 12px; opacity: 0.7;">❧ 天下大事 · 尽在其中 ❧</p>
  </footer>

  <script>
    // ========================================
    // 新闻源配置
    // ========================================
    const RSS_SOURCES = {
      sina: 'https://rss.sina.com.cn/news/marquee/int.xml',
      '163': 'https://news.163.com/special/0001386F/rss_world.xml',
      qq: 'https://r.inews.qq.com/gw/event/hot_ranking_list?page_size=50',
      '36kr': 'https://36kr.com/feed',
      hacker: 'https://hnrss.org/frontpage'
    };

    const API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=';

    // ========================================
    // 分类关键词
    // ========================================
    const CATEGORY_KEYWORDS = {
      tech: ['科技', 'AI', '互联网', '手机', '软件', '数据', '算法', '芯片', 'tech', 'AI', 'software'],
      finance: ['财经', '股票', '基金', '银行', '经济', '金融', '投资', 'finance', 'stock', 'money'],
      world: ['国际', '世界', '全球', '外交', '战争', 'world', 'international', 'global'],
      sports: ['体育', '足球', '篮球', '奥运', '比赛', 'sports', 'football', 'basketball'],
      entertainment: ['娱乐', '明星', '电影', '音乐', '演出', 'entertainment', 'movie', 'celebrity']
    };

    let allNews = [];
    let currentCategory = 'all';
    let currentSource = 'all';

    // ========================================
    // 初始化
    // ========================================
    document.addEventListener('DOMContentLoaded', () => {
      loadNews();
      initCategoryTabs();
      loadSettings();
      // 每 3 分钟自动刷新
      setInterval(loadNews, 180000);
    });

    // ========================================
    // 分类标签初始化
    // ========================================
    function initCategoryTabs() {
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.category-tab').forEach(t => {
            t.classList.remove('active');
            t.setAttribute('aria-selected', 'false');
          });
          tab.classList.add('active');
          tab.setAttribute('aria-selected', 'true');
          currentCategory = tab.dataset.category;
          renderNews();
        });
      });
    }

    // ========================================
    // 加载新闻
    // ========================================
    async function loadNews() {
      const container = document.getElementById('news');
      container.setAttribute('aria-busy', 'true');
      container.innerHTML = '<div class="loading" role="status">正在加载要闻...</div>';
      
      try {
        const sources = currentSource === 'all' 
          ? Object.keys(RSS_SOURCES) 
          : [currentSource];
        
        const promises = sources.map(source => 
          fetch(API_URL + encodeURIComponent(RSS_SOURCES[source]))
            .then(r => r.json())
            .then(data => ({ source, items: data.items || [] }))
            .catch(() => ({ source, items: [] }))
        );

        const results = await Promise.all(promises);
        allNews = results
          .flatMap(r => r.items.map(item => ({ ...item, source: r.source })))
          .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        renderNews();
        updateLastUpdate();
        saveSettings();
      } catch (err) {
        container.innerHTML = `
          <div class="error" role="alert">
            加载失败：${err.message}
            <button onclick="loadNews()" aria-label="重试">重试</button>
          </div>
        `;
      } finally {
        container.setAttribute('aria-busy', 'false');
      }
    }

    // ========================================
    // 渲染新闻 - 性能优化
    // ========================================
    function renderNews() {
      const container = document.getElementById('news');
      
      let filtered = allNews;
      
      if (currentSource !== 'all') {
        filtered = filtered.filter(n => n.source === currentSource);
      }
      
      if (currentCategory !== 'all') {
        const keywords = CATEGORY_KEYWORDS[currentCategory];
        filtered = filtered.filter(n => {
          const text = (n.title + ' ' + (n.description || '')).toLowerCase();
          return keywords.some(k => text.includes(k.toLowerCase()));
        });
      }

      if (filtered.length === 0) {
        container.innerHTML = '<div class="loading" role="status">暂无要闻</div>';
        return;
      }

      // 使用 DocumentFragment 优化 DOM 操作
      const fragment = document.createDocumentFragment();
      
      filtered.forEach(item => {
        const category = detectCategory(item);
        const timeAgo = getTimeAgo(new Date(item.pubDate));
        
        const card = document.createElement('article');
        card.className = 'news-card';
        card.setAttribute('role', 'article');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', item.title);
        card.onclick = () => window.open(item.link, '_blank');
        
        // 键盘支持
        card.onkeydown = (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.open(item.link, '_blank');
          }
        };
        
        card.innerHTML = `
          ${item.enclosure?.link ? `<img src="${item.enclosure.link}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
          <div class="content">
            <span class="category">${category}</span>
            <h3 class="title">${escapeHtml(item.title)}</h3>
            <p class="desc">${escapeHtml(stripHtml(item.description || '暂无摘要'))}</p>
            <div class="meta">
              <span class="source">📍 ${getSourceName(item.source)}</span>
              <span class="time">🕐 ${timeAgo}</span>
            </div>
          </div>
        `;
        
        fragment.appendChild(card);
      });
      
      container.innerHTML = '';
      container.appendChild(fragment);
    }

    // ========================================
    // 辅助函数
    // ========================================
    function detectCategory(item) {
      const text = (item.title + ' ' + (item.description || '')).toLowerCase();
      for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
        if (keywords.some(k => text.includes(k.toLowerCase()))) {
          return cat === 'tech' ? '科技' : 
                 cat === 'finance' ? '财经' : 
                 cat === 'world' ? '国际' : 
                 cat === 'sports' ? '体育' : '娱乐';
        }
      }
      return '综合';
    }

    function getSourceName(source) {
      const names = {
        sina: '新浪',
        '163': '网易',
        qq: '腾讯',
        '36kr': '36Kr',
        hacker: 'Hacker News'
      };
      return names[source] || source;
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTimeAgo(date) {
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
      return `${Math.floor(diff / 86400)}天前`;
    }

    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }

    function changeSource() {
      currentSource = document.getElementById('sourceSelect').value;
      loadNews();
    }

    function saveSettings() {
      localStorage.setItem('lastSource', currentSource);
      localStorage.setItem('lastCategory', currentCategory);
    }

    function loadSettings() {
      const lastSource = localStorage.getItem('lastSource');
      if (lastSource) {
        currentSource = lastSource;
        document.getElementById('sourceSelect').value = lastSource;
      }
      
      const lastCategory = localStorage.getItem('lastCategory');
      if (lastCategory) {
        currentCategory = lastCategory;
        document.querySelectorAll('.category-tab').forEach(tab => {
          const isActive = tab.dataset.category === lastCategory;
          tab.classList.toggle('active', isActive);
          tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
      }
    }
  </script>
</body>
</html>
