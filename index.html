<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📜 每日要闻 - 古风资讯</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap');

    :root {
      --primary: #8B4513;
      --primary-dark: #5D2E0C;
      --accent: #C41E3A;
      --bg: #F5E6D3;
      --bg-dark: #E8D5C4;
      --paper: #FFF8F0;
      --ink: #2C2C2C;
      --ink-light: #5A5A5A;
      --gold: #B8860B;
      --border: #8B7355;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      background: var(--bg);
      background-image: 
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238B4513' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      color: var(--ink);
      line-height: 1.8;
      overflow-x: hidden;
    }

    /* 云纹装饰 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 50 Q30 30 50 50 T90 50' stroke='%238B4513' stroke-width='2' fill='none' opacity='0.1'/%3E%3C/svg%3E") repeat-x;
      opacity: 0.3;
      pointer-events: none;
      z-index: 1000;
    }

    /* Header - 牌匾风格 */
    header {
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 25px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-bottom: 3px solid var(--gold);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 32px;
      color: var(--paper);
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      padding: 10px 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border: 2px solid var(--gold);
    }

    .logo::before {
      content: '📜';
      font-size: 36px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls select, .controls button {
      padding: 10px 20px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      background: var(--paper);
      color: var(--primary);
      transition: all 0.3s;
      font-weight: 600;
    }

    .controls select:hover, .controls button:hover {
      background: var(--gold);
      color: var(--paper);
      transform: translateY(-2px);
    }

    /* Main */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* 卷轴标题 */
    .scroll-title {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .scroll-title h2 {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 28px;
      color: var(--primary);
      display: inline-block;
      padding: 15px 40px;
      background: var(--paper);
      border: 3px solid var(--primary);
      border-radius: 4px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .scroll-title::before,
    .scroll-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 100px;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), transparent);
    }

    .scroll-title::before { left: 0; }
    .scroll-title::after { right: 0; transform: scaleX(-1); }

    /* Category Tabs - 书签风格 */
    .category-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      background: var(--paper);
      border: 2px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .category-tab {
      padding: 10px 25px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      position: relative;
      overflow: hidden;
    }

    .category-tab::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(139,69,19,0.2), transparent);
      transition: left 0.5s;
    }

    .category-tab:hover::before {
      left: 100%;
    }

    .category-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .category-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--paper);
      box-shadow: 0 4px 10px rgba(139,69,19,0.3);
    }

    /* News Grid - 奏折风格 */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 25px;
    }

    .news-card {
      background: var(--paper);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
      transition: all 0.4s ease;
      cursor: pointer;
      border: 1px solid var(--border);
      position: relative;
    }

    .news-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--gold), var(--primary));
    }

    .news-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 12px 30px rgba(139,69,19,0.25);
      border-color: var(--gold);
    }

    .news-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--bg-dark);
      filter: sepia(20%) contrast(95%);
      transition: filter 0.3s;
    }

    .news-card:hover img {
      filter: sepia(0%) contrast(100%);
    }

    .news-card .content {
      padding: 20px;
    }

    .news-card .category {
      display: inline-block;
      padding: 5px 15px;
      background: var(--primary);
      color: var(--paper);
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 12px;
      font-weight: 600;
      border: 1px solid var(--gold);
    }

    .news-card .title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 12px;
      line-height: 1.5;
      color: var(--ink);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-family: 'Noto Serif SC', serif;
    }

    .news-card .desc {
      font-size: 14px;
      color: var(--ink-light);
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.7;
    }

    .news-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--ink-light);
      padding-top: 15px;
      border-top: 1px dashed var(--border);
    }

    .news-card .source {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 600;
    }

    .news-card .time {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* 角花装饰 */
    .news-card .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid var(--gold);
      opacity: 0.5;
    }

    .news-card .corner-tl {
      top: 10px;
      left: 10px;
      border-right: none;
      border-bottom: none;
    }

    .news-card .corner-br {
      bottom: 10px;
      right: 10px;
      border-left: none;
      border-top: none;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-light);
      font-size: 16px;
    }

    .loading::before {
      content: '📜';
      display: block;
      font-size: 48px;
      margin-bottom: 20px;
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: var(--accent);
      font-size: 16px;
    }

    /* Footer - 卷轴风格 */
    footer {
      text-align: center;
      padding: 40px;
      color: var(--ink-light);
      font-size: 14px;
      margin-top: 50px;
      background: var(--paper);
      border-top: 3px solid var(--gold);
      position: relative;
    }

    footer::before {
      content: '❧';
      display: block;
      font-size: 24px;
      color: var(--gold);
      margin-bottom: 10px;
    }

    /* 印章效果 */
    .seal {
      display: inline-block;
      padding: 8px 15px;
      background: var(--accent);
      color: white;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      border: 2px solid var(--accent);
      box-shadow: 0 2px 8px rgba(196,30,58,0.3);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .logo {
        font-size: 24px;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .category-tabs {
        overflow-x: auto;
        justify-content: flex-start;
      }
    }

    /* 墨迹晕染效果 */
    .ink-blot {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139,69,19,0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="ink-blot" style="top: 10%; left: 5%;"></div>
  <div class="ink-blot" style="bottom: 20%; right: 10%;"></div>

  <header>
    <div class="header-content">
      <div class="logo">每日要闻</div>
      <div class="controls">
        <select id="sourceSelect" onchange="changeSource()">
          <option value="all">📰 全部来源</option>
          <option value="sina">🔴 新浪新闻</option>
          <option value="163">🔵 网易新闻</option>
          <option value="qq">🟢 腾讯新闻</option>
          <option value="36kr">🟡 36Kr</option>
          <option value="hacker">💻 Hacker News</option>
        </select>
        <button onclick="loadNews()">🔄 刷新</button>
      </div>
    </div>
  </header>

  <main>
    <div class="scroll-title">
      <h2>📜 今日头条</h2>
    </div>

    <div class="category-tabs">
      <button class="category-tab active" data-category="all">全部</button>
      <button class="category-tab" data-category="tech">科技</button>
      <button class="category-tab" data-category="finance">财经</button>
      <button class="category-tab" data-category="world">国际</button>
      <button class="category-tab" data-category="sports">体育</button>
      <button class="category-tab" data-category="entertainment">娱乐</button>
    </div>

    <div id="news" class="news-grid">
      <div class="loading">正在加载要闻...</div>
    </div>
  </main>

  <footer>
    <p><span class="seal">更新</span> <span id="lastUpdate">-</span></p>
    <p>每 3 分钟自动刷新 · 支持离线阅读</p>
    <p style="margin-top: 15px; font-size: 12px; opacity: 0.7;">❧ 天下大事 · 尽在其中 ❧</p>
  </footer>

  <script>
    // 新闻源配置
    const RSS_SOURCES = {
      sina: 'https://rss.sina.com.cn/news/marquee/int.xml',
      '163': 'https://news.163.com/special/0001386F/rss_world.xml',
      qq: 'https://r.inews.qq.com/gw/event/hot_ranking_list?page_size=50',
      '36kr': 'https://36kr.com/feed',
      hacker: 'https://hnrss.org/frontpage'
    };

    const API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=';

    // 分类关键词
    const CATEGORY_KEYWORDS = {
      tech: ['科技', 'AI', '互联网', '手机', '软件', '数据', '算法', '芯片', 'tech', 'AI', 'software'],
      finance: ['财经', '股票', '基金', '银行', '经济', '金融', '投资', 'finance', 'stock', 'money'],
      world: ['国际', '世界', '全球', '外交', '战争', 'world', 'international', 'global'],
      sports: ['体育', '足球', '篮球', '奥运', '比赛', 'sports', 'football', 'basketball'],
      entertainment: ['娱乐', '明星', '电影', '音乐', '演出', 'entertainment', 'movie', 'celebrity']
    };

    let allNews = [];
    let currentCategory = 'all';
    let currentSource = 'all';

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadNews();
      initCategoryTabs();
      loadSettings();
      setInterval(loadNews, 180000);
    });

    // 分类标签
    function initCategoryTabs() {
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentCategory = tab.dataset.category;
          renderNews();
        });
      });
    }

    // 加载新闻
    async function loadNews() {
      const container = document.getElementById('news');
      container.innerHTML = '<div class="loading">正在加载要闻...</div>';
      
      try {
        const sources = currentSource === 'all' 
          ? Object.keys(RSS_SOURCES) 
          : [currentSource];
        
        const promises = sources.map(source => 
          fetch(API_URL + encodeURIComponent(RSS_SOURCES[source]))
            .then(r => r.json())
            .then(data => ({ source, items: data.items || [] }))
            .catch(() => ({ source, items: [] }))
        );

        const results = await Promise.all(promises);
        allNews = results
          .flatMap(r => r.items.map(item => ({ ...item, source: r.source })))
          .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        renderNews();
        updateLastUpdate();
        saveSettings();
      } catch (err) {
        container.innerHTML = `<div class="error">加载失败：${err.message}<br><button onclick="loadNews()" style="margin-top:10px;padding:10px 20px;cursor:pointer;">重试</button></div>`;
      }
    }

    // 渲染新闻
    function renderNews() {
      const container = document.getElementById('news');
      
      let filtered = allNews;
      
      if (currentSource !== 'all') {
        filtered = filtered.filter(n => n.source === currentSource);
      }
      
      if (currentCategory !== 'all') {
        const keywords = CATEGORY_KEYWORDS[currentCategory];
        filtered = filtered.filter(n => {
          const text = (n.title + ' ' + (n.description || '')).toLowerCase();
          return keywords.some(k => text.includes(k.toLowerCase()));
        });
      }

      if (filtered.length === 0) {
        container.innerHTML = '<div class="loading">暂无要闻</div>';
        return;
      }

      container.innerHTML = filtered.map(item => {
        const category = detectCategory(item);
        const timeAgo = getTimeAgo(new Date(item.pubDate));
        
        return `
          <div class="news-card" onclick="window.open('${item.link}', '_blank')">
            <div class="corner corner-tl"></div>
            <div class="corner corner-br"></div>
            ${item.enclosure?.link ? `<img src="${item.enclosure.link}" alt="" onerror="this.style.display='none'">` : ''}
            <div class="content">
              <span class="category">${category}</span>
              <h3 class="title">${item.title}</h3>
              <p class="desc">${stripHtml(item.description || '暂无摘要')}</p>
              <div class="meta">
                <span class="source">📍 ${getSourceName(item.source)}</span>
                <span class="time">🕐 ${timeAgo}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 检测分类
    function detectCategory(item) {
      const text = (item.title + ' ' + (item.description || '')).toLowerCase();
      for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
        if (keywords.some(k => text.includes(k.toLowerCase()))) {
          return cat === 'tech' ? '科技' : 
                 cat === 'finance' ? '财经' : 
                 cat === 'world' ? '国际' : 
                 cat === 'sports' ? '体育' : '娱乐';
        }
      }
      return '综合';
    }

    // 获取来源名称
    function getSourceName(source) {
      const names = {
        sina: '新浪',
        '163': '网易',
        qq: '腾讯',
        '36kr': '36Kr',
        hacker: 'Hacker News'
      };
      return names[source] || source;
    }

    // 去除 HTML 标签
    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    // 时间格式化
    function getTimeAgo(date) {
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
      return `${Math.floor(diff / 86400)}天前`;
    }

    // 更新最后更新时间
    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }

    // 切换来源
    function changeSource() {
      currentSource = document.getElementById('sourceSelect').value;
      loadNews();
    }

    // 保存设置
    function saveSettings() {
      localStorage.setItem('lastSource', currentSource);
      localStorage.setItem('lastCategory', currentCategory);
    }

    // 加载设置
    function loadSettings() {
      const lastSource = localStorage.getItem('lastSource');
      if (lastSource) {
        currentSource = lastSource;
        document.getElementById('sourceSelect').value = lastSource;
      }
      
      const lastCategory = localStorage.getItem('lastCategory');
      if (lastCategory) {
        currentCategory = lastCategory;
        document.querySelectorAll('.category-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.category === lastCategory);
        });
      }
    }
  </script>
</body>
</html>
