<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 每日新闻 - 个性化资讯</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls select, .controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .controls select:hover, .controls button:hover {
      background: rgba(255,255,255,0.3);
    }

    .controls select option {
      background: var(--primary);
      color: white;
    }

    /* Main */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Category Tabs */
    .category-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .category-tab {
      padding: 8px 20px;
      border: 2px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      font-size: 14px;
    }

    .category-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .category-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .news-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }

    .news-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--border);
    }

    .news-card .content {
      padding: 20px;
    }

    .news-card .category {
      display: inline-block;
      padding: 4px 12px;
      background: var(--primary);
      color: white;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .news-card .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .desc {
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 15px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-light);
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }

    .news-card .source {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .news-card .time {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }

    .loading::before {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      text-align: center;
      padding: 60px 20px;
      color: #dc2626;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 30px;
      color: var(--text-light);
      font-size: 14px;
      margin-top: 40px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .category-tabs {
        overflow-x: auto;
        flex-wrap: nowrap;
      }
    }

    /* Dark Mode */
    body.dark-mode {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-light: #94a3b8;
      --border: #334155;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">📰 每日新闻</div>
      <div class="controls">
        <select id="sourceSelect" onchange="changeSource()">
          <option value="all">📰 全部来源</option>
          <option value="sina">🔴 新浪新闻</option>
          <option value="163">🔵 网易新闻</option>
          <option value="qq">🟢 腾讯新闻</option>
          <option value="36kr">🟡 36Kr</option>
          <option value="hacker">💻 Hacker News</option>
        </select>
        <button onclick="loadNews()">🔄 刷新</button>
        <button onclick="toggleDark()">🌙 夜间</button>
      </div>
    </div>
  </header>

  <main>
    <div class="category-tabs">
      <button class="category-tab active" data-category="all">全部</button>
      <button class="category-tab" data-category="tech">科技</button>
      <button class="category-tab" data-category="finance">财经</button>
      <button class="category-tab" data-category="world">国际</button>
      <button class="category-tab" data-category="sports">体育</button>
      <button class="category-tab" data-category="entertainment">娱乐</button>
    </div>

    <div id="news" class="news-grid">
      <div class="loading">正在加载新闻...</div>
    </div>
  </main>

  <footer>
    <p>最后更新：<span id="lastUpdate">-</span></p>
    <p>每 3 分钟自动刷新 · 支持离线阅读</p>
  </footer>

  <script>
    // 新闻源配置
    const RSS_SOURCES = {
      sina: 'https://rss.sina.com.cn/news/marquee/int.xml',
      '163': 'https://news.163.com/special/0001386F/rss_world.xml',
      qq: 'https://r.inews.qq.com/gw/event/hot_ranking_list?page_size=50',
      '36kr': 'https://36kr.com/feed',
      hacker: 'https://hnrss.org/frontpage'
    };

    const API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=';

    // 分类关键词
    const CATEGORY_KEYWORDS = {
      tech: ['科技', 'AI', '互联网', '手机', '软件', '数据', '算法', '芯片', 'tech', 'AI', 'software'],
      finance: ['财经', '股票', '基金', '银行', '经济', '金融', '投资', 'finance', 'stock', 'money'],
      world: ['国际', '世界', '全球', '外交', '战争', 'world', 'international', 'global'],
      sports: ['体育', '足球', '篮球', '奥运', '比赛', 'sports', 'football', 'basketball'],
      entertainment: ['娱乐', '明星', '电影', '音乐', '演出', 'entertainment', 'movie', 'celebrity']
    };

    let allNews = [];
    let currentCategory = 'all';
    let currentSource = 'all';

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadNews();
      initCategoryTabs();
      loadSettings();
      // 每 3 分钟自动刷新
      setInterval(loadNews, 180000);
    });

    // 分类标签
    function initCategoryTabs() {
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentCategory = tab.dataset.category;
          renderNews();
        });
      });
    }

    // 加载新闻
    async function loadNews() {
      const container = document.getElementById('news');
      container.innerHTML = '<div class="loading">正在加载新闻...</div>';
      
      try {
        // 加载多个来源
        const sources = currentSource === 'all' 
          ? Object.keys(RSS_SOURCES) 
          : [currentSource];
        
        const promises = sources.map(source => 
          fetch(API_URL + encodeURIComponent(RSS_SOURCES[source]))
            .then(r => r.json())
            .then(data => ({ source, items: data.items || [] }))
            .catch(() => ({ source, items: [] }))
        );

        const results = await Promise.all(promises);
        allNews = results
          .flatMap(r => r.items.map(item => ({ ...item, source: r.source })))
          .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        renderNews();
        updateLastUpdate();
        saveSettings();
      } catch (err) {
        container.innerHTML = `<div class="error">加载失败：${err.message}<br><button onclick="loadNews()" style="margin-top:10px;padding:10px 20px;cursor:pointer;">重试</button></div>`;
      }
    }

    // 渲染新闻
    function renderNews() {
      const container = document.getElementById('news');
      
      let filtered = allNews;
      
      // 按来源过滤
      if (currentSource !== 'all') {
        filtered = filtered.filter(n => n.source === currentSource);
      }
      
      // 按分类过滤
      if (currentCategory !== 'all') {
        const keywords = CATEGORY_KEYWORDS[currentCategory];
        filtered = filtered.filter(n => {
          const text = (n.title + ' ' + (n.description || '')).toLowerCase();
          return keywords.some(k => text.includes(k.toLowerCase()));
        });
      }

      if (filtered.length === 0) {
        container.innerHTML = '<div class="loading">暂无新闻</div>';
        return;
      }

      container.innerHTML = filtered.map(item => {
        const category = detectCategory(item);
        const timeAgo = getTimeAgo(new Date(item.pubDate));
        
        return `
          <div class="news-card" onclick="window.open('${item.link}', '_blank')">
            ${item.enclosure?.link ? `<img src="${item.enclosure.link}" alt="" onerror="this.style.display='none'">` : ''}
            <div class="content">
              <span class="category">${category}</span>
              <h3 class="title">${item.title}</h3>
              <p class="desc">${stripHtml(item.description || '暂无摘要')}</p>
              <div class="meta">
                <span class="source">📍 ${getSourceName(item.source)}</span>
                <span class="time">🕐 ${timeAgo}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 检测分类
    function detectCategory(item) {
      const text = (item.title + ' ' + (item.description || '')).toLowerCase();
      for (const [cat, keywords] of Object.entries(CATEGORY_KEYWORDS)) {
        if (keywords.some(k => text.includes(k.toLowerCase()))) {
          return cat === 'tech' ? '科技' : 
                 cat === 'finance' ? '财经' : 
                 cat === 'world' ? '国际' : 
                 cat === 'sports' ? '体育' : '娱乐';
        }
      }
      return '综合';
    }

    // 获取来源名称
    function getSourceName(source) {
      const names = {
        sina: '新浪',
        '163': '网易',
        qq: '腾讯',
        '36kr': '36Kr',
        hacker: 'Hacker News'
      };
      return names[source] || source;
    }

    // 去除 HTML 标签
    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }

    // 时间格式化
    function getTimeAgo(date) {
      const now = new Date();
      const diff = Math.floor((now - date) / 1000);
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
      return `${Math.floor(diff / 86400)}天前`;
    }

    // 更新最后更新时间
    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }

    // 切换来源
    function changeSource() {
      currentSource = document.getElementById('sourceSelect').value;
      loadNews();
    }

    // 切换夜间模式
    function toggleDark() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    // 保存设置
    function saveSettings() {
      localStorage.setItem('lastSource', currentSource);
      localStorage.setItem('lastCategory', currentCategory);
    }

    // 加载设置
    function loadSettings() {
      const darkMode = localStorage.getItem('darkMode') === 'true';
      if (darkMode) document.body.classList.add('dark-mode');
      
      const lastSource = localStorage.getItem('lastSource');
      if (lastSource) {
        currentSource = lastSource;
        document.getElementById('sourceSelect').value = lastSource;
      }
      
      const lastCategory = localStorage.getItem('lastCategory');
      if (lastCategory) {
        currentCategory = lastCategory;
        document.querySelectorAll('.category-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.category === lastCategory);
        });
      }
    }
  </script>
</body>
</html>
